<div class="container my-5">
  <h2 class="text-center mb-4">Registrasi Member JogSpace</h2>

  <!-- Form pendaftaran -->
  <form action="landing.html">

    <div class="mb-3">
      <label class="form-label">Nama Lengkap</label>
      <input type="text" class="form-control" placeholder="Masukkan nama" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Alamat</label>
      <textarea class="form-control" rows="3" required></textarea>
    </div>

    <div class="mb-3">
      <label class="form-label">Tanggal Kunjungan Pertama</label>
      <input type="date" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Tipe Member</label><br>
      <input type="radio" name="member" required> Reguler
      <input type="radio" name="member"> VIP
    </div>

    <div class="mb-3">
      <label class="form-label">Fasilitas yang Diminati</label><br>
      <input type="checkbox"> Coworking Area<br>
      <input type="checkbox"> Meeting Room<br>
      <input type="checkbox"> Podcast Room<br>
      <input type="checkbox"> Library<br>
      <input type="checkbox"> Cafe
    </div>

    <div class="mb-4">
      <label class="form-label">Pilih Area Gedung</label>
      <select class="form-select" required>
        <option value="">-- Pilih Lantai --</option>
        <option>Lantai 1 - Coworking & Cafe</option>
        <option>Lantai 2 - Meeting Room & Podcast Room</option>
        <option>Lantai 3 - Library & Quiet Area</option>
      </select>
    </div>

    <div class="text-center">
      <button type="submit" class="btn pink-btn px-4">Daftar Sekarang</button>
    </div>

  </form>
</div>

    <footer class="text-center py-3 pink-bg text-white">

    </footer>

</body>
